<h2>Your Cart</h2>

<table class="table">

<tr *ngFor="let item of cart; let i=index">

<td>{{item.name}}</td>
<td>₹{{item.price}}</td>

<td>
<button (click)="removeItem(i)">
Remove
</button>
</td>

</tr>

</table>

<h3>Total: ₹{{total}}</h3>

<button (click)="placeOrder()" class="btn btn-success">
Place Order
</button>
