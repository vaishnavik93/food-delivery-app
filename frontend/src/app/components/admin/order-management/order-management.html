
<div class="container mt-4">

<h3>Order Management</h3>

<table class="table">

<thead>

<tr>

<th>OrderID</th>
<th>Customer</th>
<th>Status</th>
<th>Update</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let order of orders">

<td>{{order.orderId}}</td>

<td>{{order.customerId}}</td>

<td>{{order.orderStatus}}</td>

<td>

<select>

<option>Preparing</option>
<option>Out for Delivery</option>
<option>Delivered</option>

</select>

</td>

</tr>

</tbody>

</table>

</div>
